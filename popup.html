<!DOCTYPE html>
<html>
  <head>
    <title>YouTube Progress Tracker</title>
    <style>
      body {
        font-family: sans-serif;
        width: 200px;
        padding: 10px;
      }
      button {
        margin-top: 10px;
        padding: 8px 12px;
        cursor: pointer;
      }
      ul {
        list-style: none;
        padding: 0;
      }
      li {
        margin-bottom: 5px;
      }
      .video-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .video-title {
        max-width: 120px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .clear-button {
        background-color: #f44336;
        color: white;
        border: none;
        border-radius: 3px;
        padding: 3px 6px;
        font-size: 0.8em;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h3>Saved Progress</h3>
    <ul id="progressList">
      <li>No saved videos found.</li>
    </ul>
    <button id="clearAll">Clear All Progress</button>
    <script src="popup.js"></script>
  </body>
</html>
